<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Therapy World Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 16px;
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        #map {
            width: 100vw;
            height: calc(100vh - 70px);
        }
        #legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 2;
        }

        .legend-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        #counter {
            position: absolute;
            top: 80px;
            right: 10px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎵 Music Therapy Congress 2026</h1>
    <div id="map"></div>

    <div id="counter">👥 Participants: 0</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <div id="legend">
    <div><span class="legend-dot" style="background:#4fc3f7"></span>Where I was born</div>
    <div><span class="legend-dot" style="background:#81c784"></span>Where I live/work</div>
    <div><span class="legend-dot" style="background:#e57373"></span>Where my patients come from</div>
    </div>

        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        const SHEET_ID = '1XozqihkO2b_jGqY6K1jcXzukO_NZq40kuTfGqhrOxRs';
        const GID = '1282753161';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        const COUNTRY_COORDS = {
            "Afghanistan": [33.9391, 67.7100],

            "Turkey": [38.9637, 35.2433],
            "Uganda": [1.3733, 32.2903],
            "Ukraine": [48.3794, 31.1656],
            "United Arab Emirates": [23.4241, 53.8478],
            "United Kingdom": [55.3781, -3.4360],
            "United States": [37.0902, -95.7129],
            "Uruguay": [-32.5228, -55.7658],
            "Venezuela": [6.4238, -66.5897],
            "Vietnam": [14.0583, 108.2772],
            "Yemen": [15.5527, 48.5164],
            "Zimbabwe": [-19.0154, 29.1549]
        };

        async function fetchData() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;

                document.getElementById('counter').textContent = `👥 Participants: ${rows.length}`;

                // Limpa os marcadores anteriores antes de redesenhar
                map.eachLayer(layer => {
                    if (layer instanceof L.CircleMarker) map.removeLayer(layer);
                });

                rows.forEach(row => {
                    const born = row.c[1]?.v;
                    const lives = row.c[2]?.v;
                    const patients = row.c[3]?.v;

                    // 🔵 Azul — onde nasceu
                    if (born && COUNTRY_COORDS[born]) {
                        L.circleMarker(COUNTRY_COORDS[born], {
                            radius: 8,
                            color: '#4fc3f7',
                            fillColor: '#4fc3f7',
                            fillOpacity: 0.8
                        }).addTo(map).bindPopup(`🔵 Born: ${born}`);
                    }

                    // 🟢 Verde — onde vive/trabalha
                    if (lives && COUNTRY_COORDS[lives]) {
                        L.circleMarker(COUNTRY_COORDS[lives], {
                            radius: 8,
                            color: '#81c784',
                            fillColor: '#81c784',
                            fillOpacity: 0.8
                        }).addTo(map).bindPopup(`🟢 Lives/Works: ${lives}`);
                    }

                    // 🔴 Vermelho — pacientes (múltiplos países)
                    if (patients) {
                        patients.split(',').forEach(p => {
                            const country = p.trim();
                            if (COUNTRY_COORDS[country]) {
                                L.circleMarker(COUNTRY_COORDS[country], {
                                    radius: 8,
                                    color: '#e57373',
                                    fillColor: '#e57373',
                                    fillOpacity: 0.8
                                }).addTo(map).bindPopup(`🔴 Patient from: ${country}`);
                            }
                        });
                    }
                });

            console.log('Mapa atualizado:', new Date().toLocaleTimeString());

            } catch (error) {
                console.error('Erro ao buscar dados:', error);
            }
        }

        // Busca imediata + atualização a cada 30 segundos
        fetchData();
        setInterval(fetchData, 10000);
    </script>

</body>
</html>
